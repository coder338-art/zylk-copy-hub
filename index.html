        <!-- 1. Hook -->

                <button onclick="remixAndCopy('hook')"

            <div id="single-vouch-box" class="output-text bg-zinc-950 border border-zinc-800 rounded-2xl p-5 min-h-[110px] text-zinc-100"></div>

        <div class="text-center mt-10 text-xs text-zinc-500">

        function getRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function getRandomTenVouches() {
            let selected = [];
            let temp = [...vouchList];
            for (let i = 0; i < 10; i++) {
                if (temp.length === 0) temp = [...vouchList];
                const idx = Math.floor(Math.random() * temp.length);
                selected.push(temp.splice(idx, 1)[0]);
            }
            return selected.join('\n');
        }

        function remixHook() {
            const hook = getRandom(hooksList);
            document.getElementById('hook-box').textContent = hook;
            return hook;
        }

        function remixCaption() {
            const caption = getRandom(captionList);
            document.getElementById('caption-box').textContent = caption;
            return caption;
        }

        function remixSingleVouch() {
            const vouch = getRandom(vouchList);
            document.getElementById('single-vouch-box').textContent = vouch;
            return vouch;
        }

        function remixTenVouches() {
            const ten = getRandomTenVouches();
            document.getElementById('ten-vouches-box').textContent = ten;
            return ten;
        }

        function remixAndCopy(type) {
            let content = "";

            if (type === 'hook') content = remixHook();
            else if (type === 'caption') content = remixCaption();
            else if (type === 'singleVouch') content = remixSingleVouch();
            else if (type === 'tenVouches') content = remixTenVouches();

            navigator.clipboard.writeText(content).then(() => {
                showCopiedFeedback(type);
            }).catch(() => {
                const ta = document.createElement('textarea');
                ta.value = content;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            });
        }

        function showCopiedFeedback(type) {
            const messages = {
                hook: "✅ Hook copied!",
                caption: "✅ Caption copied!",
                singleVouch: "✅ Single vouch copied!",
                tenVouches: "✅ 10 vouches copied!"
            };
            const toast = document.createElement('div');
            toast.className = "fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-6 py-3 rounded-2xl text-sm font-medium shadow-2xl z-50";
            toast.textContent = messages[type];
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 1600);
        }

        // Initial load
        window.onload = () => {
            remixHook();
            remixCaption();
            remixSingleVouch();
            remixTenVouches();
        };
