<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecom Generator • Hooks + Vouches</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&amp;display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', 'Inter', system_ui, sans-serif; font-weight: 600; }
        
        .section-box {
            transition: all 0.3s ease;
        }
        
        .generate-btn {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .output-text {
            font-size: 15.5px;
            line-height: 1.7;
            white-space: pre-wrap;
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen pb-12">
    <div class="max-w-xl mx-auto px-4 py-8">
        <div class="text-center mb-10">
            <h1 class="text-4xl font-display tracking-tighter">Ecom Generator</h1>
            <p class="text-zinc-400 mt-1">Hooks • Single Vouch • 10 Vouches</p>
        </div>

        <!-- Hooks Section -->
        <div class="section-box mb-8 bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold flex items-center gap-x-2">
                    <span class="text-violet-400">✦</span> Hook
                </h2>
                <button onclick="remixAndCopy('hook')" 
                        class="flex items-center gap-x-2 px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium">
                    <i class="fa-solid fa-sync-alt"></i>
                    <span>Remix & Copy</span>
                </button>
            </div>
            <div id="hook-box" class="output-text bg-zinc-950 border border-zinc-800 rounded-2xl p-5 min-h-[68px] text-zinc-100"></div>
        </div>

        <!-- Single Vouch Section -->
        <div class="section-box mb-8 bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold flex items-center gap-x-2">
                    <span class="text-emerald-400">✦</span> Single Vouch
                </h2>
                <button onclick="remixAndCopy('singleVouch')" 
                        class="flex items-center gap-x-2 px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium">
                    <i class="fa-solid fa-sync-alt"></i>
                    <span>Remix & Copy</span>
                </button>
            </div>
            <div id="single-vouch-box" class="output-text bg-zinc-950 border border-zinc-800 rounded-2xl p-5 min-h-[110px] text-zinc-100"></div>
        </div>

        <!-- 10 Vouches Section -->
        <div class="section-box bg-zinc-900 border border-zinc-800 rounded-3xl p-6">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-xl font-semibold flex items-center gap-x-2">
                    <span class="text-amber-400">✦</span> 10 Vouches
                </h2>
                <button onclick="remixAndCopy('tenVouches')" 
                        class="flex items-center gap-x-2 px-5 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm font-medium">
                    <i class="fa-solid fa-sync-alt"></i>
                    <span>Remix & Copy</span>
                </button>
            </div>
            <div id="ten-vouches-box" class="output-text bg-zinc-950 border border-zinc-800 rounded-2xl p-5 text-zinc-100 text-sm leading-relaxed"></div>
        </div>

        <div class="text-center mt-10 text-xs text-zinc-500">
            Tap Remix & Copy to refresh that section and copy to clipboard
        </div>
    </div>

        const vouchList = [
            "This is actually the best AirPods case I’ve ever owned 😭 The glow is so strong and the quicksand is so satisfying!!",

            "Real review: glow is strong, case feels premium, and it’s so fun 😭🔥",
            "Legit the best AirPods case I own. The glow is bright af and the quicksand is so satisfying!!",
            "This is actually addictive. Can’t put it down 😭🌟",
            "Way better than the plain Apple one. The glow makes it unique!!",
            "Bought the black one and the glow still pops so hard 👀",
            "Perfect for night owls!! Never lose my pods anymore 🌌",
            "The glow + protection combo is unmatched. Apple default who?? 😂",
            "This case is a lifesaver and looks amazing ✨",
            "Real one: it actually works as good as the videos show. Vouching!! 🌟"
        ];

        function getRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function getRandomVouches(count) {
            let selected = [];
            let temp = [...vouchList];
            for (let i = 0; i < count; i++) {
                if (temp.length === 0) temp = [...vouchList];
                const idx = Math.floor(Math.random() * temp.length);
                selected.push(temp.splice(idx, 1)[0]);
            }
            return selected.join('\n\n');
        }

        // Generate functions
        function remixHook() {
            const hook = getRandom(hooksList);
            document.getElementById('hook-box').textContent = hook;
            return hook;
        }

        function remixSingleVouch() {
            const vouch = getRandom(vouchList);
            document.getElementById('single-vouch-box').textContent = vouch;
            return vouch;
        }

        function remixTenVouches() {
            const ten = getRandomVouches(10);
            document.getElementById('ten-vouches-box').textContent = ten;
            return ten;
        }

        function remixAndCopy(type) {
            let content = "";

            if (type === 'hook') {
                content = remixHook();
            } else if (type === 'singleVouch') {
                content = remixSingleVouch();
            } else if (type === 'tenVouches') {
                content = remixTenVouches();
            }

            // Copy to clipboard
            navigator.clipboard.writeText(content).then(() => {
                showCopiedFeedback(type);
            }).catch(() => {
                // fallback
                const ta = document.createElement('textarea');
                ta.value = content;
                document.body.appendChild(ta);
                ta.select();
                document.execCommand('copy');
                document.body.removeChild(ta);
            });
        }

        function showCopiedFeedback(type) {
            // Simple alert for feedback
            const messages = {
                hook: "Hook copied!",
                singleVouch: "Single vouch copied!",
                tenVouches: "10 vouches copied!"
            };
            const el = document.createElement('div');
            el.className = "fixed bottom-6 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-6 py-3 rounded-2xl text-sm font-medium shadow-xl z-50";
            el.textContent = messages[type];
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1400);
        }

        // Initial load
        window.onload = () => {
            remixHook();
            remixSingleVouch();
            remixTenVouches();
        };
    </script>
</body>
</html>
