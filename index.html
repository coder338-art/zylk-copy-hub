<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecom Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system_ui, sans-serif; }
        .font-display { font-family: 'Space Grotesk', system_ui, sans-serif; }
        .box { font-family: 'Inter', system_ui, sans-serif; line-height: 1.75; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen pb-12">
    <div class="max-w-xl mx-auto px-4 py-8">

        <div class="text-center mb-10">
            <h1 class="text-4xl font-display tracking-tight">Ecom Generator</h1>
            <p class="text-zinc-400">Hooks • Single Vouch • 10 Vouches</p>
        </div>

        <!-- Hooks Box -->
        <div class="mb-8">
            <div class="flex justify-between items-center mb-3 px-1">
                <h2 class="font-semibold text-lg">🔥 Hook</h2>
                <button onclick="remixHook()" 
                        class="flex items-center gap-x-2 px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm">
                    <i class="fa-solid fa-sync-alt"></i>
                    <span>Remix + Copy</span>
                </button>
            </div>
            <div id="hook-box" class="box bg-zinc-900 border border-zinc-800 rounded-3xl p-6 text-[16px] min-h-[80px]"></div>
        </div>

        <!-- Single Vouch Box -->
        <div class="mb-8">
            <div class="flex justify-between items-center mb-3 px-1">
                <h2 class="font-semibold text-lg">💬 Single Vouch Comment</h2>
                <button onclick="remixSingleVouch()" 
                        class="flex items-center gap-x-2 px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm">
                    <i class="fa-solid fa-sync-alt"></i>
                    <span>Remix + Copy</span>
                </button>
            </div>
            <div id="single-vouch-box" class="box bg-zinc-900 border border-zinc-800 rounded-3xl p-6 text-[16px] min-h-[100px]"></div>
        </div>

        <!-- 10 Vouches Box -->
        <div>
            <div class="flex justify-between items-center mb-3 px-1">
                <h2 class="font-semibold text-lg">🔁 10 Vouch Comments</h2>
                <button onclick="remixTenVouches()" 
                        class="flex items-center gap-x-2 px-4 py-2 bg-zinc-800 hover:bg-zinc-700 rounded-2xl text-sm">
                    <i class="fa-solid fa-sync-alt"></i>
                    <span>Remix + Copy</span>
                </button>
            </div>
            <div id="ten-vouches-box" class="box bg-zinc-900 border border-zinc-800 rounded-3xl p-6 text-[15px] leading-relaxed whitespace-pre-line"></div>
        </div>

    </div>

    <script>
        // Paste your full lists here
        const hooks = [ /* your hooks list */ ];
        const vouchComments = [ /* your vouch comments list */ ];

        function getRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function getRandomTen(arr) {
            let result = [];
            let shuffled = [...arr].sort(() => 0.5 - Math.random());
            for (let i = 0; i < 10; i++) {
                result.push(shuffled[i % shuffled.length]);
            }
            return result.join('\n');
        }

        function remixHook() {
            const hook = getRandom(hooks);
            document.getElementById('hook-box').textContent = hook;
            navigator.clipboard.writeText(hook);
        }

        function remixSingleVouch() {
            const vouch = getRandom(vouchComments);
            document.getElementById('single-vouch-box').textContent = vouch;
            navigator.clipboard.writeText(vouch);
        }

        function remixTenVouches() {
            const ten = getRandomTen(vouchComments);
            document.getElementById('ten-vouches-box').textContent = ten;
            navigator.clipboard.writeText(ten);
        }

        // Initial load
        window.onload = () => {
            remixHook();
            remixSingleVouch();
            remixTenVouches();
        };
    </script>
</body>
</html>
