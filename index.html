<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecom Generator • Hooks + Vouch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .output-box { font-size: 15.5px; line-height: 1.75; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen pb-12">
    <div class="max-w-xl mx-auto px-4 py-8">

        <h1 class="text-3xl font-semibold text-center mb-8 tracking-tight">Ecom Generator</h1>

        <!-- Main Generate -->
        <button onclick="generateAll()" 
                class="w-full bg-white text-zinc-950 font-semibold py-5 rounded-3xl active:scale-95 transition-all flex items-center justify-center gap-x-3 text-lg mb-10">
            <i class="fa-solid fa-sync-alt"></i>
            <span>New Hook + Vouch</span>
        </button>

        <!-- Hook Section -->
        <div class="mb-8">
            <div class="flex justify-between items-center mb-2 px-1">
                <div class="text-xs uppercase tracking-widest text-zinc-500">HOOK</div>
                <button onclick="copyHook()" 
                        class="text-emerald-400 hover:text-emerald-300 text-sm flex items-center gap-x-1.5">
                    <i class="fa-solid fa-copy"></i>
                    <span>COPY HOOK</span>
                </button>
            </div>
            <div id="hook-output" 
                 class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 min-h-[110px] output-box leading-relaxed">
            </div>
        </div>

        <!-- Vouch Section -->
        <div class="mb-8">
            <div class="flex justify-between items-center mb-2 px-1">
                <div class="text-xs uppercase tracking-widest text-zinc-500">VOUCH COMMENT</div>
                <div class="flex gap-x-3">
                    <button onclick="copyVouch()" 
                            class="text-emerald-400 hover:text-emerald-300 text-sm flex items-center gap-x-1.5">
                        <i class="fa-solid fa-copy"></i>
                        <span>COPY</span>
                    </button>
                    <button onclick="copy10Vouch()" 
                            class="text-amber-400 hover:text-amber-300 text-sm flex items-center gap-x-1.5">
                        <i class="fa-solid fa-list"></i>
                        <span>10 VOUCHES</span>
                    </button>
                </div>
            </div>
            <div id="vouch-output" 
                 class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 min-h-[110px] output-box leading-relaxed">
            </div>
        </div>

        <div class="text-center text-xs text-zinc-500 mt-10">
            New Hook + Vouch • Individual copy buttons • Mobile friendly
        </div>
    </div>

    <script>
        // ====================== NEW HOOKS ======================
        const hooks = [
            "this changes everything", "i wish i found this sooner", "i wasn't expecting this",
            "wait until the lights go out", "this is why i bought it", "i finally understand the hype",
            "i almost didn't buy this", "this is your sign", "one of the coolest things i own",
            "watch this...", "i can't believe this works", "okay this is actually insane",
            "i found something cool", "why didn't anyone tell me about this",
            "i would've bought this years ago", "don't blink", "just watch",
            "trust me on this one", "this gets me every time", "this is too satisfying",
            "if you lose your AirPods... watch this", "every AirPods owner needs this",
            "no more looking for my AirPods", "this solved one annoying problem",
            "late-night me is thankful for this", "my room is always dark",
            "if you know, you know", "i got tired of losing them", "finally fixed this problem",
            "the one accessory i actually use", "this belongs on every AirPods case",
            "you'll understand in a second", "one tiny upgrade", "i use this every day",
            "you're gonna want one", "don't miss this", "i would've bought this sooner",
            "low-key worth it", "this is staying forever", "my favorite purchase this month",
            "this is actually useful", "one of my best impulse buys", "i don't regret buying this",
            "this never gets old", "i'm keeping this", "worth every penny", "instant upgrade",
            "lights off 👀", "glow check", "wait for the glow", "the glow never gets old",
            "this looks unreal at night", "this is the best part", "it's even brighter in person",
            "this glow is crazy", "the camera doesn't do it justice", "every night looks like this now"
        ];

        // ====================== NEW VOUCH COMMENTS ======================
        const vouchComments = [
            "need this 😭", "just ordered one", "okay you got me", "added to cart 😭",
            "this is actually sick", "where'd you get this", "link??", "why do i want this so bad",
            "that's clean", "lowkey need one", "this is fire", "just bought mine",
            "mine comes tomorrow 🙏", "finally someone posted the link", "ordered 😭",
            "this is actually useful", "i would've bought this instantly", 
            "the glow is way better than i expected", "mine arrived today 🔥",
            "been using mine every day", "lowkey worth it", "fits perfectly",
            "shipping was faster than i expected", "i got the blue one",
            "i need the green one too", "this looks so much better in person",
            "i wasn't expecting the glow to be that bright", "i'm obsessed 😭",
            "best accessory i've bought", "this convinced me", "take my money",
            "okay i'm sold", "instant purchase", "i need this in blue",
            "this scratches my brain", "why is this so satisfying", "now i want one 😂",
            "i didn't know these existed", "this is genius", "this deserves more views",
            "can't stop watching this", "i've watched this like 10 times",
            "this is actually kinda smart", "i love simple stuff like this",
            "that's a buy from me", "bro 😭", "okayyy", "yup i'm buying one",
            "that's actually cool", "this is clean af", "i need this immediately"
        ];

        let currentHook = "";
        let currentVouch = "";

        function getRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function generateAll() {
            currentHook = getRandom(hooks);
            currentVouch = getRandom(vouchComments);

            document.getElementById('hook-output').textContent = currentHook;
            document.getElementById('vouch-output').textContent = currentVouch;
        }

        function copyHook() {
            if (!currentHook) return;
            navigator.clipboard.writeText(currentHook);
            showFeedback('hook');
        }

        function copyVouch() {
            if (!currentVouch) return;
            navigator.clipboard.writeText(currentVouch);
            showFeedback('vouch');
        }

        function copy10Vouch() {
            let text = "";
            for (let i = 0; i < 10; i++) {
                text += getRandom(vouchComments) + "\n\n";
            }
            navigator.clipboard.writeText(text.trim());
            showFeedback('10vouch');
        }

        function showFeedback(type) {
            const buttons = document.querySelectorAll('button');
            buttons.forEach(btn => {
                if ((type === 'hook' && btn.innerText.includes('HOOK')) ||
                    (type === 'vouch' && btn.innerText.includes('COPY') && !btn.innerText.includes('10')) ||
                    (type === '10vouch' && btn.innerText.includes('10'))) {
                    const original = btn.innerHTML;
                    btn.innerHTML = `<i class="fa-solid fa-check"></i> COPIED`;
                    setTimeout(() => { btn.innerHTML = original; }, 1400);
                }
            });
        }

        window.onload = () => {
            generateAll();
        };
    </script>
</body>
</html>
