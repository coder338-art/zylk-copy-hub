<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ecom Generator • Hooks + Vouch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .output-box { font-size: 15.5px; line-height: 1.75; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen pb-12">
    <div class="max-w-xl mx-auto px-4 py-8">

        <h1 class="text-3xl font-semibold text-center mb-8 tracking-tight">Ecom Generator</h1>

        <!-- Generate Buttons -->
        <div class="grid grid-cols-2 gap-4 mb-10">
            <button onclick="generateAll()" 
                    class="bg-white text-zinc-950 font-semibold py-5 rounded-3xl active:scale-95 transition-all flex items-center justify-center gap-x-3 text-lg">
                <i class="fa-solid fa-sync-alt"></i>
                <span>New Hook + Vouch</span>
            </button>
            
            <button onclick="copyToClipboard()" 
                    class="bg-emerald-600 hover:bg-emerald-500 font-semibold py-5 rounded-3xl active:scale-95 transition-all flex items-center justify-center gap-x-3 text-lg">
                <i class="fa-solid fa-copy"></i>
                <span>Copy All</span>
            </button>
        </div>

        <!-- Hook Section -->
        <div class="mb-8">
            <div class="text-xs uppercase tracking-widest text-zinc-500 mb-2 px-1">HOOK</div>
            <div id="hook-output" 
                 class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 min-h-[110px] output-box leading-relaxed">
            </div>
        </div>

        <!-- Vouch Section -->
        <div>
            <div class="text-xs uppercase tracking-widest text-zinc-500 mb-2 px-1">VOUCH COMMENT</div>
            <div id="vouch-output" 
                 class="bg-zinc-900 border border-zinc-800 rounded-3xl p-6 min-h-[110px] output-box leading-relaxed">
            </div>
        </div>

        <div class="text-center text-xs text-zinc-500 mt-10">
            Tap "New Hook + Vouch" for fresh combinations • Fully mobile optimized
        </div>
    </div>

    <script>
        // ====================== HOOKS ======================
        const hooks = [
            // Curiosity
            "Wait...", "Hold on.", "No way.", "This is real.", "I found this online.", 
            "This caught me off guard.", "Didn't expect this.", "This exists??", 
            "What...", "This is kinda insane.", "Okay, I'm impressed.", 
            "I had to try this.", "I wasn't expecting much.", 
            "I couldn't scroll past this.", "Had to see if it was real.", 
            "It actually works.", "I get the hype.", "This is cooler than I thought.",
            "Why is nobody talking about this?", "Wait until you see this.",

            // AirPods
            "Finding my AirPods at 3 AM 👀", "I'd never lose my AirPods again.",
            "Apple should've made this.", "My favorite AirPods accessory.",
            "AirPods owners need this.", "Best AirPods upgrade.", 
            "Small upgrade, huge difference.", "My AirPods finally look different.",

            // Glow / Night
            "Wait until the lights go off.", "Glow check 🌙", "The glow is unreal.",
            "The glow is crazy.", "It glows all night.", "This never gets old.",
            "Still glowing...", "The glow is so clean.", "Night mode.", "Lights out.",

            // Apple / Value / Reaction
            "Apple should make these.", "Worth every penny.", "I'm obsessed.",
            "This is oddly satisfying.", "I always lose my AirPods.", 
            "Problem solved.", "POV: It's 2 AM.", "Don't miss this.", 
            "Glad I bought one.", "Need.", "Wow.", "Clean.", "Genius.",

            // Lifestyle
            "Best thing on my desk.", "Favorite gadget.", "This lives on my AirPods.",
            "Definitely keeping this.", "Love this thing."
        ];

        // ====================== VOUCH COMMENTS ======================
        const vouchComments = [
            // Product quality
            "Mine came today, it's actually really nice.",
            "Better quality than I expected.",
            "Fits perfectly.",
            "The glow is brighter in person.",
            "Love mine.", "Ordered a second one.",

            // Glow
            "The glow lasts longer than I thought.",
            "It actually helps me find my AirPods at night.",
            "The glow is so satisfying.",

            // Shipping / Gift
            "Mine arrived in 8 days.", "Shipping was pretty quick.",
            "Bought one for my girlfriend.", "Ordered two 😂",

            // General
            "Didn't expect to like this so much.",
            "Low-key my favorite accessory now.",
            "Worth every penny.", "Highly recommend.",
            "10/10.", "I'd buy it again.",

            // Purchase intent
            "I need this.", "Added to cart.", "Instant buy.", 
            "Take my money.", "This is actually cool.", 
            "Buying one tonight."
        ];

        let currentHook = "";
        let currentVouch = "";

        function getRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function generateAll() {
            currentHook = getRandom(hooks);
            currentVouch = getRandom(vouchComments);

            document.getElementById('hook-output').textContent = currentHook;
            document.getElementById('vouch-output').textContent = currentVouch;

            // Auto copy the combination
            const fullText = `${currentHook}\n\n${currentVouch}`;
            navigator.clipboard.writeText(fullText);
        }

        function copyToClipboard() {
            if (!currentHook) {
                generateAll();
                return;
            }
            const fullText = `${currentHook}\n\n${currentVouch}`;
            navigator.clipboard.writeText(fullText);
            
            // Visual feedback
            const btns = document.querySelectorAll('button');
            btns.forEach(btn => {
                if (btn.innerText.includes('Copy')) {
                    const original = btn.innerHTML;
                    btn.innerHTML = `<i class="fa-solid fa-check"></i> COPIED!`;
                    setTimeout(() => { btn.innerHTML = original; }, 1500);
                }
            });
        }

        // Generate first one on load
        window.onload = () => {
            generateAll();
        };
    </script>
</body>
</html>
