        </div>

        <!-- SINGLE VOUCH BOX -->

            <div id="single-vouch-box" class="output-box bg-zinc-900 border border-zinc-700 rounded-3xl p-6 min-h-[70px]">

            </div>
            <div id="ten-vouch-box" class="output-box bg-zinc-900 border border-zinc-700 rounded-3xl p-6 whitespace-pre-line leading-relaxed min-h-[280px]">

        function getRandom(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function getRandomVouches(count) {
            let selected = new Set();
            while (selected.size < count) {
                selected.add(getRandom(vouchComments));
            }
            return Array.from(selected).join('\n');
        }

        function generateHook() {
            document.getElementById('hook-box').textContent = getRandom(hooks);
        }

        function generateSingleVouch() {
            document.getElementById('single-vouch-box').textContent = getRandom(vouchComments);
        }

        function generateTenVouches() {
            document.getElementById('ten-vouch-box').textContent = getRandomVouches(10);
        }

        function remixAndCopy(type) {
            let content = "";

            if (type === 'hook') {
                generateHook();
                content = document.getElementById('hook-box').textContent;
            } else if (type === 'single-vouch') {
                generateSingleVouch();
                content = document.getElementById('single-vouch-box').textContent;
            } else if (type === 'ten-vouch') {
                generateTenVouches();
                content = document.getElementById('ten-vouch-box').textContent;
            }

            navigator.clipboard.writeText(content).then(() => {
                // Optional: show brief feedback
            });
        }

        // Initial generation
        window.onload = () => {
            generateHook();
            generateSingleVouch();
            generateTenVouches();
        };
